name: Build APK from ZIP

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Unzip Project
        run: unzip project.zip

      - name: Show Files
        run: ls -R

      - name: Enter Project Folder
        run: cd t4app_premium_project

      - name: Give Permission
        run: |
          cd t4app_premium_project
          chmod +x gradlew

      - name: Build APK
        run: |
          cd t4app_premium_project
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: t4app_premium_project/app/build/outputs/apk/debug/app-debug.apk
